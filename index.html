<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITN MASS CAMPAIGN @2026</title>

<style>
:root{
    --plasma1:#0d0887;
    --plasma2:#6a00a8;
    --plasma3:#9c179e;
    --plasma4:#cc4778;
    --plasma5:#ed7953;
    --plasma6:#fdb42f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:#ffffff;
}

/* HEADER */
header{
    background:linear-gradient(
        135deg,
        var(--plasma1),
        var(--plasma2),
        var(--plasma3),
        var(--plasma4)
    );
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    padding:20px 30px;
}

.header-container{
    max-width:1400px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left-logo img{
    width:90px;
    height:90px;
    object-fit:contain;
}

.center-title{
    flex:1;
    text-align:center;
    color:#fff;
}

.center-title h1{
    font-size:2.2rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
}

.center-title .line{
    width:120px;
    height:4px;
    background:var(--plasma6);
    margin:12px auto;
    border-radius:20px;
}

.right-logo{
    text-align:center;
    color:#fff;
}

.right-logo img{
    width:90px;
    height:90px;
    object-fit:contain;
}

.right-logo h3{
    margin-top:8px;
    font-size:0.95rem;
    font-weight:700;
    text-transform:uppercase;
}

/* BODY */
main{
    flex:1;
    background:#ffffff;
    padding:40px 20px 60px;
}

.partners-section{
    width:100%;
    max-width:1100px;
    margin:auto;
}

.partners-title{
    text-align:center;
    color:var(--plasma2);
    font-size:1.8rem;
    font-weight:700;
    letter-spacing:4px;
    margin-bottom:30px;
}

.partners-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.partner-tab{
    width:120px;
    height:120px;
    background:#ffffff;
    border:2px solid #e5e7eb;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    transition:0.3s ease;
}

.partner-tab:hover{
    transform:translateY(-5px);
    border-color:var(--plasma3);
}

.partner-tab img{
    width:75px;
    height:75px;
    object-fit:contain;
}

.campaign-image{
    margin-top:40px;
    display:flex;
    justify-content:center;
}

.campaign-image img{
    width:100%;
    max-width:650px;
    height:auto;
    border-radius:20px;
    border:4px solid #f3f4f6;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* MENU TABS */
.menu-tabs{
    margin-top:45px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.menu-tab{
    min-width:170px;
    padding:16px 22px;
    text-align:center;
    text-decoration:none;
    color:#fff;
    font-weight:600;
    border-radius:14px;
    background:linear-gradient(
        135deg,
        var(--plasma1),
        var(--plasma2),
        var(--plasma3)
    );
    box-shadow:0 8px 20px rgba(106,0,168,0.25);
    transition:all 0.3s ease;
}

.menu-tab:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 25px rgba(106,0,168,0.35);
}

.menu-tab:nth-child(5),
.menu-tab:nth-child(6){
    background:linear-gradient(
        135deg,
        var(--plasma3),
        var(--plasma4),
        var(--plasma5)
    );
}

/* FOOTER */
footer{
    background:linear-gradient(
        135deg,
        var(--plasma1),
        var(--plasma2),
        var(--plasma3),
        var(--plasma4)
    );
    color:#fff;
    text-align:center;
    padding:18px;
    font-size:1rem;
    font-weight:600;
    letter-spacing:2px;
    box-shadow:0 -4px 15px rgba(0,0,0,0.15);
}

/* MOBILE */
@media(max-width:768px){

    .header-container{
        flex-direction:column;
        gap:15px;
    }

    .center-title h1{
        font-size:1.5rem;
    }

    .left-logo img,
    .right-logo img{
        width:70px;
        height:70px;
    }

    .partner-tab{
        width:95px;
        height:95px;
    }

    .partner-tab img{
        width:55px;
        height:55px;
    }

    .campaign-image img{
        max-width:100%;
    }

    .menu-tab{
        min-width:140px;
        font-size:0.9rem;
    }
}
</style>
</head>

<body>

<header>

    <div class="header-container">

        <div class="left-logo">
            <img src="ICF.png" alt="ICF Logo">
        </div>

        <div class="center-title">
            <h1>National Malaria Control Program</h1>
            <div class="line"></div>
        </div>

        <div class="right-logo">
            <img src="NMCP.png" alt="NMCP Logo">
            <h3>ITN MASS CAMPAIGN @2026</h3>
        </div>

    </div>

</header>

<main>

    <section class="partners-section">

        <div class="partners-title">
            PARTNERS
        </div>

        <div class="partners-wrapper">

            <div class="partner-tab">
                <img src="WHO.png" alt="WHO">
            </div>

            <div class="partner-tab">
                <img src="THE GLOBAL FUND.png" alt="The Global Fund">
            </div>

            <div class="partner-tab">
                <img src="UNICEF.png" alt="UNICEF">
            </div>

            <div class="partner-tab">
                <img src="USAID.png" alt="USAID">
            </div>

        </div>

        <div class="campaign-image">
            <img src="image.png" alt="Campaign Image">
        </div>

        <div class="menu-tabs">

            <a href="reg.html" class="menu-tab">Registration</a>

            <a href="distribution.html" class="menu-tab">Distribution</a>

            <a href="stock.html" class="menu-tab">Stock</a>

            <a href="dashboard.html" class="menu-tab">Dashboard</a>

            <a href="attendees.html" class="menu-tab">Attendees</a>

            <a href="monitoring.html" class="menu-tab">Monitoring Checklist</a>

        </div>

    </section>

</main>

<footer>
    ICF-SL @2026
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ITN MASS CAMPAIGN @2026</title>

<style>
:root{
    --plasma1:#0d0887;
    --plasma2:#6a00a8;
    --plasma3:#9c179e;
    --plasma4:#cc4778;
    --plasma5:#ed7953;
    --plasma6:#fdb42f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:#ffffff;
}

/* HEADER */
header{
    background:linear-gradient(
        135deg,
        var(--plasma1),
        var(--plasma2),
        var(--plasma3),
        var(--plasma4)
    );
    padding:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.header-container{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}

.left-logo img{
    width:60px;
    height:60px;
    object-fit:contain;
}

.center-title{
    flex:1;
    text-align:center;
    color:#fff;
}

.center-title h1{
    font-size:1rem;
    font-weight:700;
    text-transform:uppercase;
    line-height:1.3;
}

.center-title .line{
    width:70px;
    height:3px;
    background:var(--plasma6);
    margin:8px auto;
    border-radius:20px;
}

.right-logo{
    text-align:center;
    color:#fff;
}

.right-logo img{
    width:60px;
    height:60px;
    object-fit:contain;
}

.right-logo h3{
    margin-top:5px;
    font-size:0.60rem;
    font-weight:700;
    line-height:1.2;
}

/* BODY */
main{
    flex:1;
    padding:20px 12px 30px;
}

.partners-section{
    width:100%;
}

.partners-title{
    text-align:center;
    color:var(--plasma2);
    font-size:1.2rem;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:15px;
}

.partners-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.partner-tab{
    width:75px;
    height:75px;
    background:#fff;
    border:2px solid #e5e7eb;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.partner-tab img{
    width:45px;
    height:45px;
    object-fit:contain;
}

.campaign-image{
    margin-top:20px;
}

.campaign-image img{
    width:100%;
    border-radius:15px;
    border:3px solid #f3f4f6;
    box-shadow:0 5px 15px rgba(0,0,0,0.12);
}

/* MENU */
.menu-tabs{
    margin-top:25px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.menu-tab{
    text-decoration:none;
    color:#fff;
    text-align:center;
    padding:14px 10px;
    border-radius:14px;
    font-size:0.85rem;
    font-weight:600;
    background:linear-gradient(
        135deg,
        var(--plasma1),
        var(--plasma2),
        var(--plasma3)
    );
    box-shadow:0 6px 15px rgba(106,0,168,0.25);
}

.menu-tab:nth-child(5),
.menu-tab:nth-child(6){
    background:linear-gradient(
        135deg,
        var(--plasma3),
        var(--plasma4),
        var(--plasma5)
    );
}

/* FOOTER */
footer{
    background:linear-gradient(
        135deg,
        var(--plasma1),
        var(--plasma2),
        var(--plasma3),
        var(--plasma4)
    );
    color:#fff;
    text-align:center;
    padding:14px;
    font-size:0.85rem;
    font-weight:600;
    letter-spacing:1px;
}

@media (min-width:768px){

    .header-container{
        max-width:1200px;
        margin:auto;
    }

    .left-logo img,
    .right-logo img{
        width:90px;
        height:90px;
    }

    .center-title h1{
        font-size:2rem;
    }

    .right-logo h3{
        font-size:0.9rem;
    }

    .partners-wrapper{
        gap:20px;
    }

    .partner-tab{
        width:120px;
        height:120px;
    }

    .partner-tab img{
        width:75px;
        height:75px;
    }

    .campaign-image img{
        max-width:650px;
        display:block;
        margin:auto;
    }

    .menu-tabs{
        grid-template-columns:repeat(3,1fr);
        max-width:900px;
        margin:35px auto 0;
    }
}
</style>
</head>

<body>

<header>

    <div class="header-container">

        <div class="left-logo">
            <img src="ICF.png" alt="ICF Logo">
        </div>

        <div class="center-title">
            <h1>National Malaria Control Program</h1>
            <div class="line"></div>
        </div>

        <div class="right-logo">
            <img src="NMCP.png" alt="NMCP Logo">
            <h3>ITN MASS CAMPAIGN @2026</h3>
        </div>

    </div>

</header>

<main>

    <section class="partners-section">

        <div class="partners-title">
            PARTNERS
        </div>

        <div class="partners-wrapper">

            <div class="partner-tab">
                <img src="WHO.png" alt="WHO">
            </div>

            <div class="partner-tab">
                <img src="THE GLOBAL FUND.png" alt="The Global Fund">
            </div>

            <div class="partner-tab">
                <img src="UNICEF.png" alt="UNICEF">
            </div>

            <div class="partner-tab">
                <img src="USAID.png" alt="USAID">
            </div>

        </div>

        <div class="campaign-image">
            <img src="image.png" alt="Campaign Image">
        </div>

        <div class="menu-tabs">

            <a href="reg.html" class="menu-tab">Registration</a>

            <a href="distribution.html" class="menu-tab">Distribution</a>

            <a href="stock.html" class="menu-tab">Stock</a>

            <a href="dashboard.html" class="menu-tab">Dashboard</a>

            <a href="attendees.html" class="menu-tab">Attendees</a>

            <a href="monitoring.html" class="menu-tab">Monitoring Checklist</a>

        </div>

    </section>

</main>

<footer>
    ICF-SL @2026
</footer>

</body>
</html>
